name: CI

on:
  push:
    branches: [main, claude/keen-fermi-hjloxw]
  pull_request:
    branches: [main, claude/keen-fermi-hjloxw]

# The CruceEP app lives in the cruceep/ subdirectory.
defaults:
  run:
    working-directory: cruceep

jobs:
  quality:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cruceep/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (best-effort)
    runs-on: ubuntu-latest
    needs: quality
    # Non-blocking: a browser-download or environment hiccup must never block CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cruceep/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
